name: Tafuta
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  Tafuta:
    type: application
    platform: macOS
    dependencies:
      - package: KeyboardShortcuts
    sources:
      - path: Sources
      - path: Resources
        # Models are downloaded on first run (ModelManager), not bundled, to keep the app small.
        excludes:
          - "Models/**"
          - "Models"
    settings:
      base:
        PRODUCT_NAME: Tafuta
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.tafuta
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_ATSApplicationFontsPath: Fonts
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Ivan Kuria. GPLv3."
        COMBINE_HIDPI_IMAGES: YES
